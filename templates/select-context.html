<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Context — BNexora</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}?v=3">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .context-wrapper {
            max-width: 800px;
            margin: 60px auto 100px auto;
            padding: 0 24px;
            position: relative;
            z-index: 10;
        }
        .context-headline {
            text-align: center;
            margin-bottom: 40px;
        }
        .context-headline h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff 0%, #a1a1aa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
        }
        .context-headline p {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }
        
        .context-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 40px;
        }

        .context-card {
            background: rgba(20, 20, 20, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-xl);
            padding: 24px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 20px;
            position: relative;
            overflow: hidden;
        }
        
        .context-card:hover {
            transform: translateY(-4px);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background: rgba(30, 30, 30, 0.8);
        }
        
        .context-icon {
            width: 56px;
            height: 56px;
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .context-icon.personal {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.2) 0%, rgba(37, 99, 235, 0.1) 100%);
            border-color: rgba(59, 130, 246, 0.3);
            color: #60a5fa;
        }
        
        .context-icon.workspace {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.2) 0%, rgba(5, 150, 105, 0.1) 100%);
            border-color: rgba(16, 185, 129, 0.3);
            color: #34d399;
        }
        
        .context-info {
            flex: 1;
        }
        
        .context-info h3 {
            color: #ffffff;
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .context-info p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin: 0;
        }
        
        .context-arrow {
            color: var(--text-tertiary);
            transition: transform 0.2s;
        }
        
        .context-card:hover .context-arrow {
            color: #ffffff;
            transform: translateX(4px);
        }
        
        .section-title {
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 16px;
            padding-left: 8px;
        }
        
        .loading-workspaces {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }
        
        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            .context-wrapper {
                margin: 40px auto;
            }
            .context-headline h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container" id="particles-js">
        <nav class="top-navbar" style="position: relative;">
            <div class="nav-left">
                <img src="{{ url_for('static', path='images/bnexora_logo.png') }}" alt="Logo" class="nav-logo" style="border-radius: 50%;">
                <span class="nav-brand">BNexora</span>
            </div>
            <div class="nav-right">
                <a href="/logout" class="nav-link">Logout</a>
            </div>
        </nav>

        <div class="context-wrapper animate-fade-up">
            <div class="context-headline">
                <h1>Where do you want to go?</h1>
                <p>Select your working context to continue to the dashboard.</p>
            </div>

            <!-- Personal Section -->
            <div class="section-title">Personal</div>
            <div class="context-grid">
                <div class="context-card" onclick="selectContext(null)">
                    <div class="context-icon personal">
                        <i data-lucide="user"></i>
                    </div>
                    <div class="context-info">
                        <h3>Personal Account</h3>
                        <p>Manage your personal projects and apps</p>
                    </div>
                    <i data-lucide="chevron-right" class="context-arrow"></i>
                </div>
            </div>
            
            <!-- Workspaces Section -->
            <div class="section-title">Company Workspaces</div>
            <div id="workspaces-container" class="context-grid">
                <div class="loading-workspaces">
                    <i data-lucide="loader" class="animate-spin" style="margin: 0 auto 12px auto;"></i>
                    <p>Loading workspaces...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        lucide.createIcons();
        particlesJS('particles-js', {
            particles: {
                number: { value: 60, density: { enable: true, value_area: 800 } },
                color: { value: "#ffffff" },
                shape: { type: "circle" },
                opacity: { value: 0.2, random: false },
                size: { value: 3, random: true },
                line_linked: { enable: true, distance: 150, color: "#ffffff", opacity: 0.1, width: 1 },
                move: { enable: true, speed: 2, direction: "none", random: false, straight: false, out_mode: "out", bounce: false }
            },
            interactivity: {
                detect_on: "canvas",
                events: {
                    onhover: { enable: true, mode: "grab" },
                    onclick: { enable: true, mode: "push" },
                    resize: true
                }
            },
            retina_detect: true
        });

        // Load Workspaces
        async function loadWorkspaces() {
            try {
                const res = await fetch('/api/workspaces');
                if (res.ok) {
                    const data = await res.json();
                    renderWorkspaces(data.workspaces);
                } else {
                    document.getElementById('workspaces-container').innerHTML = '<div class="loading-workspaces">Failed to load workspaces.</div>';
                }
            } catch (err) {
                console.error(err);
                document.getElementById('workspaces-container').innerHTML = '<div class="loading-workspaces">Error loading workspaces.</div>';
            }
        }

        function renderWorkspaces(workspaces) {
            const container = document.getElementById('workspaces-container');
            
            if (!workspaces || workspaces.length === 0) {
                container.innerHTML = `
                    <div class="context-card" style="border: 1px dashed rgba(255,255,255,0.2); justify-content: center; text-align: center;" onclick="window.location.href='/dashboard'">
                        <div class="context-info">
                            <p>No workspaces found. You can create one from the Dashboard.</p>
                        </div>
                    </div>
                `;
                return;
            }

            container.innerHTML = workspaces.map(ws => `
                <div class="context-card" onclick="selectContext('${ws.id}')">
                    <div class="context-icon workspace">
                        <i data-lucide="briefcase"></i>
                    </div>
                    <div class="context-info">
                        <h3>${ws.name}</h3>
                        <p>${ws.role === 'owner' ? 'Owner' : 'Member'}</p>
                    </div>
                    <i data-lucide="chevron-right" class="context-arrow"></i>
                </div>
            `).join('');
            lucide.createIcons();
        }

        // Selection Logic
        function selectContext(workspaceId) {
            // Clear current app selection to prevent data leaks between contexts
            document.cookie = "current_app_id=; path=/; max-age=0";
            
            if (workspaceId) {
                document.cookie = "current_workspace_id=" + workspaceId + "; path=/; max-age=" + (60*60*24*30);
            } else {
                // Clear workspace ID for personal mode
                document.cookie = "current_workspace_id=; path=/; max-age=0";
            }
            
            window.location.href = '/dashboard';
        }

        // Helper to get cookie
        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
            return '';
        }

        // Init
        document.addEventListener('DOMContentLoaded', () => {
            loadWorkspaces();
        });
    </script>
</body>
</html>
